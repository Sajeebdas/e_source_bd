<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>E Source BD App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',sans-serif;background:#0b0f1a;color:#fff}

.app{max-width:420px;height:100vh;margin:auto;background:linear-gradient(180deg,#0f2027,#000);overflow:hidden;position:relative}

.login{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%}
.login input{width:80%;padding:12px;margin:8px;border-radius:8px;border:none}
.login button{padding:10px 20px;border:none;border-radius:8px;background:#00ffcc;cursor:pointer}

.dashboard{display:none;height:100%;position:relative;padding-bottom:70px}

.header{text-align:center;padding:12px;font-weight:bold;background:linear-gradient(90deg,#00ffcc,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Circle */
.circle{
  width:300px;height:300px;border-radius:50%;
  margin:30px auto;position:relative;overflow:hidden;
  background:#00ff99;box-shadow:0 0 20px #00ffcc;
}

.slice{position:absolute;width:50%;height:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;transition:.4s}
.slice1{top:0;left:50%;transform:translateX(-50%)}
.slice2{top:0;right:50%;transform:translateX(50%)}
.slice3{bottom:0;left:50%;transform:translateX(-50%)}
.slice4{bottom:0;right:50%;transform:translateX(50%)}

.slice:hover{
  transform:scale(1.1);
  background:linear-gradient(135deg,#2196f3,#ff4ecd);
  box-shadow:0 0 15px #00f0ff,0 0 30px #ff00d4;
  border-radius:50%;
}

.slice-content{opacity:0;transition:.3s;text-align:center}
.slice:hover .slice-content{opacity:1}

/* NAV */
.nav{
  position:absolute;bottom:0;width:100%;height:60px;background:#111;
  display:flex;justify-content:space-around;align-items:center;
}
.nav button{background:none;border:none;color:#aaa;cursor:pointer}
.nav button.active{color:#00ffcc}

.section{display:none;text-align:center;padding-top:20px}
.section.active{display:block}

/* Profile */
.profile-img{
  width:120px;height:120px;border-radius:50%;object-fit:cover;
  border:3px solid #00ffcc;
}

/* Modal */
.modal{
  position:absolute;width:100%;height:100%;
  background:rgba(0,0,0,.7);
  display:flex;justify-content:center;align-items:center;
  visibility:hidden;opacity:0;transition:.3s;
}
.modal.active{visibility:visible;opacity:1}
.modal-box{background:#fff;color:#000;padding:20px;border-radius:10px}

/* Chart */
.chart-box{
  width:90%;
  margin:auto;
  background:#111;
  padding:15px;
  border-radius:10px;
}

/* Dollar */
.dollar{position:absolute;color:rgba(0,255,150,.3);animation:float linear infinite}
@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-10vh)}}
</style>
</head>

<body>

<div class="app">

<!-- LOGIN -->
<div class="login" id="login">
  <h2>Login</h2>
  <input type="text" id="user" placeholder="Username (Sajeeb, Sriti, Jannat, Nahid)">
  <input type="password" id="pass" placeholder="Password">
  <input type="email" id="email" placeholder="Email (Optional)">
  <button onclick="login()">Enter</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="header">E Source BD</div>

<!-- HOME -->
<div class="section active" id="home">
  <div class="circle">
    <div class="slice slice1"><div class="slice-content">Sriti<br>$6000</div></div>
    <div class="slice slice2"><div class="slice-content">Sajeeb<br>$9000</div></div>
    <div class="slice slice3"><div class="slice-content">Nahid<br>$4000</div></div>
    <div class="slice slice4"><div class="slice-content">Jannat<br>$7500</div></div>
  </div>
</div>

<!-- ANALYTICS -->
<div class="section" id="analytics">
  <h3>Sales Chart</h3>

  <div class="chart-box">
    <canvas id="salesChart"></canvas>
  </div>
</div>

<!-- PROFILE -->
<div class="section" id="profile">
  <h3>Profile</h3>
  <img id="profile-img" class="profile-img">
  <p id="profile-name"></p>
  <p id="profile-email"></p>

  <button onclick="logout()" style="margin-top:10px;padding:10px;background:red;color:#fff;border:none;border-radius:8px">
    Logout
  </button>
</div>

<!-- NAV -->
<div class="nav">
  <button class="active" onclick="switchTab('home',this)">Home</button>
  <button onclick="switchTab('analytics',this)">Analytics</button>
  <button onclick="switchTab('profile',this)">Profile</button>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="name"></h3>
    <p id="sales"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

</div>

<script>

const users=['Sajeeb','Sriti','Jannat','Nahid'];
const passCode='1234';

/* LOGIN */
function login(){
  const u=document.getElementById('user').value.trim();
  const p=document.getElementById('pass').value.trim();
  const e=document.getElementById('email').value.trim();

  if(users.includes(u) && p===passCode){
    localStorage.setItem('name',u);
    localStorage.setItem('email',e);
    localStorage.setItem('img','images/'+u+'.png');

    document.getElementById('login').style.display='none';
    document.getElementById('dashboard').style.display='block';

    loadProfile();
    loadChart();
  }else alert('Wrong Username or Password');
}

/* PROFILE */
function loadProfile(){
  document.getElementById('profile-name').innerText=localStorage.getItem('name');
  document.getElementById('profile-email').innerText=localStorage.getItem('email');
  document.getElementById('profile-img').src=localStorage.getItem('img');
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  document.getElementById('dashboard').style.display='none';
  document.getElementById('login').style.display='flex';
}

/* NAV */
function switchTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* CHART */
function loadChart(){
  new Chart(document.getElementById('salesChart'),{
    type:'bar',
    data:{
      labels:['Sriti','Sajeeb','Nahid','Jannat'],
      datasets:[{
        label:'Sales ($)',
        data:[6000,9000,4000,7500]
      }]
    }
  });
}

/* FLOATING $ */
setInterval(()=>{
  const d=document.createElement('div');
  d.className='dollar';
  d.innerText='$';
  d.style.left=Math.random()*100+'%';
  d.style.animationDuration=(Math.random()*3+3)+'s';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),5000);
},150);

</script>

</body>
</html>
